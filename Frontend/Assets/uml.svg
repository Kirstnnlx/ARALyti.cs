<svg width="1900" height="1350" viewBox="0 0 1900 1350" xmlns="http://www.w3.org/2000/svg">

<style>
    .bg {
        fill: #060816;
    }

    .box {
        fill: #0E1435;
        stroke: #8E58FF;
        stroke-width: 2.5;
        rx: 16;
    }

    .title {
        fill: white;
        font: bold 36px 'Segoe UI';
    }

    .classTitle {
        fill: #A970FF;
        font: bold 20px 'Segoe UI';
    }

    .text {
        fill: #D4DBF4;
        font: 14px 'Segoe UI';
    }

    .line {
        stroke: #8E58FF;
        stroke-width: 2;
    }

    .relation {
        fill: #A970FF;
        font: italic 13px 'Segoe UI';
    }
</style>

<rect width="1900" height="1350" class="bg"/>



<!-- DATABASE SERVICE -->

<rect x="60" y="120" width="470" height="600" class="box"/>

<text x="185" y="155" class="classTitle">DatabaseService</text>

<line x1="60" y1="170" x2="530" y2="170" class="line"/>

<text x="80" y="200" class="text">- DatabasePath : string</text>
<text x="80" y="225" class="text">- ConnectionString : string</text>

<line x1="60" y1="245" x2="530" y2="245" class="line"/>

<text x="80" y="275" class="text">+ InitializeDatabase() : void</text>
<text x="80" y="300" class="text">+ SaveUserName() : void</text>
<text x="80" y="325" class="text">+ GetSavedUserName() : string</text>
<text x="80" y="350" class="text">+ GetDateJoined() : string</text>
<text x="80" y="375" class="text">+ GetUserStreak() : int</text>
<text x="80" y="400" class="text">+ UpdateUserStreak() : void</text>
<text x="80" y="425" class="text">+ SaveProject() : void</text>
<text x="80" y="450" class="text">+ GetProjects() : List&lt;Project&gt;</text>
<text x="80" y="475" class="text">+ SaveTopic() : void</text>
<text x="80" y="500" class="text">+ GetTopicsByProjectId()</text>
<text x="80" y="525" class="text">+ GetOverallTopics()</text>
<text x="80" y="550" class="text">+ SaveDiaryEntry()</text>
<text x="80" y="575" class="text">+ GetDiaryEntries()</text>
<text x="80" y="600" class="text">+ DeleteProjectByFilePath()</text>
<text x="80" y="625" class="text">+ SaveProgressRecord()</text>
<text x="80" y="650" class="text">+ GetRecentProgressWithDates()</text>
<text x="80" y="675" class="text">+ ResetAllData()</text>

<!-- DASHBOARD VIEW -->

<rect x="700" y="120" width="420" height="320" class="box"/>

<text x="820" y="155" class="classTitle">DashboardView</text>

<line x1="700" y1="170" x2="1120" y2="170" class="line"/>

<text x="720" y="200" class="text">- overallProgress : double</text>
<text x="720" y="225" class="text">- strongestTopics : List&lt;Topic&gt;</text>
<text x="720" y="250" class="text">- weakestTopics : List&lt;Topic&gt;</text>

<line x1="700" y1="270" x2="1120" y2="270" class="line"/>

<text x="720" y="300" class="text">+ LoadDashboard()</text>
<text x="720" y="325" class="text">+ LoadDonutChart()</text>
<text x="720" y="350" class="text">+ LoadLineGraph()</text>
<text x="720" y="375" class="text">+ LoadRecommendations()</text>
<text x="720" y="400" class="text">+ RefreshDashboard()</text>

<!-- SCAN PROJECT VIEW -->

<rect x="1290" y="120" width="500" height="380" class="box"/>

<text x="1430" y="155" class="classTitle">ScanProjectView</text>

<line x1="1290" y1="170" x2="1790" y2="170" class="line"/>

<text x="1310" y="200" class="text">- selectedProjectPath : string</text>
<text x="1310" y="225" class="text">- detectedTopics : List&lt;Topic&gt;</text>

<line x1="1290" y1="245" x2="1790" y2="245" class="line"/>

<text x="1310" y="275" class="text">+ SelectProject()</text>
<text x="1310" y="300" class="text">+ AnalyzeCode()</text>
<text x="1310" y="325" class="text">+ DetectTopics()</text>
<text x="1310" y="350" class="text">+ ComputeTopicDetection()</text>
<text x="1310" y="375" class="text">+ SaveScanResults()</text>
<text x="1310" y="400" class="text">+ UpdateDashboard()</text>
<text x="1310" y="425" class="text">+ GenerateRecommendations()</text>
<text x="1310" y="450" class="text">+ SaveProgressHistory()</text>

<!-- TOPICS VIEW -->

<rect x="700" y="565" width="420" height="330" class="box"/>

<text x="845" y="595" class="classTitle">TopicsView</text>

<line x1="700" y1="610" x2="1120" y2="610" class="line"/>

<text x="720" y="640" class="text">- topics : List&lt;Topic&gt;</text>
<text x="720" y="665" class="text">- experienceFactor : double</text>

<line x1="700" y1="685" x2="1120" y2="685" class="line"/>

<text x="720" y="715" class="text">+ LoadTopics()</text>
<text x="720" y="740" class="text">+ ComputeMasteryScore()</text>
<text x="720" y="765" class="text">+ DetermineTopicStatus()</text>
<text x="720" y="790" class="text">+ FilterTopics()</text>
<text x="720" y="815" class="text">+ RefreshTopicCards()</text>
<text x="720" y="840" class="text">+ UpdateTopicProgress()</text>

<!-- PROJECT DIARY VIEW -->

<rect x="1290" y="620" width="500" height="280" class="box"/>

<text x="1420" y="655" class="classTitle">ProjectDiaryView</text>

<line x1="1290" y1="670" x2="1790" y2="670" class="line"/>

<text x="1310" y="700" class="text">- diaryEntries : List&lt;ProjectDiaryEntry&gt;</text>

<line x1="1290" y1="720" x2="1790" y2="720" class="line"/>

<text x="1310" y="750" class="text">+ LoadEntries()</text>
<text x="1310" y="775" class="text">+ DeleteProject()</text>
<text x="1310" y="800" class="text">+ RefreshDashboard()</text>
<text x="1310" y="825" class="text">+ RecomputeMasteryScores()</text>

<!-- TOPIC -->

<rect x="120" y="905" width="360" height="220" class="box"/>

<text x="280" y="935" class="classTitle">Topic</text>

<line x1="120" y1="950" x2="480" y2="950" class="line"/>

<text x="140" y="980" class="text">+ Name : string</text>
<text x="140" y="1005" class="text">+ Difficulty : string</text>
<text x="140" y="1030" class="text">+ Status : string</text>
<text x="140" y="1055" class="text">+ Score : int</text>

<!-- PROJECT -->

<rect x="720" y="1000" width="360" height="200" class="box"/>

<text x="870" y="1030" class="classTitle">Project</text>

<line x1="720" y1="1040" x2="1080" y2="1040" class="line"/>

<text x="740" y="1070" class="text">+ ProjectId : string</text>
<text x="740" y="1095" class="text">+ Title : string</text>
<text x="740" y="1120" class="text">+ FilePath : string</text>
<text x="740" y="1145" class="text">+ Status : string</text>

<!-- PROJECT DIARY ENTRY -->

<rect x="1320" y="990" width="420" height="220" class="box"/>

<text x="1430" y="1025" class="classTitle">ProjectDiaryEntry</text>

<line x1="1320" y1="1040" x2="1740" y2="1040" class="line"/>

<text x="1340" y="1070" class="text">+ EntryId : string</text>
<text x="1340" y="1095" class="text">+ ProjectTitle : string</text>
<text x="1340" y="1120" class="text">+ Note : string</text>
<text x="1340" y="1145" class="text">+ DateCreated : DateTime</text>

<!-- RELATIONSHIPS -->

<!-- ================================================= -->
<!-- UML RELATIONSHIP ARROWS + MULTIPLICITIES -->
<!-- Replace your current RELATIONSHIPS section with this -->
<!-- ================================================= -->

<defs>

    <!-- Standard Arrow -->
    <marker id="arrow"
            markerWidth="12"
            markerHeight="12"
            refX="10"
            refY="6"
            orient="auto">

        <path d="M0,0 L12,6 L0,12 Z"
              fill="#8E58FF"/>
    </marker>

    <!-- Diamond Composition -->
    <marker id="diamond"
            markerWidth="16"
            markerHeight="16"
            refX="8"
            refY="8"
            orient="auto">

        <path d="M0,8 L8,0 L16,8 L8,16 Z"
              fill="#8E58FF"/>
    </marker>

</defs>

<!-- ================================================= -->
<!-- DatabaseService -> DashboardView -->
<!-- ================================================= -->

<line x1="530"
      y1="320"
      x2="695"
      y2="320"
      class="line"
      marker-end="url(#arrow)"/>

<text x="585" y="305" class="relation">uses</text>

<text x="540" y="345" class="relation">1</text>
<text x="675" y="345" class="relation">1</text>

